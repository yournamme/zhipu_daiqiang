# 动态代理配置文件
#
# 【重要】健康检测目标应与你的实际请求目标一致。
# 如果目标是国内站点（如 bigmodel.cn），必须使用国内代理源。
# 境外免费代理列表（github raw）无法可靠访问国内域名，请替换为国内代理 API。
#
# 推荐国内代理服务商（支持按量付费 API 拉取 IP:Port 列表）：
#   - 快代理  https://www.kuaidaili.com/
#   - 芝麻代理 https://www.zmhttp.com/
#   - 阿布云  https://www.abucloud.net/
#   - 太阳HTTP https://www.taiyanghttps.com/
# 将 API 返回的 txt 格式地址填入 proxy_list_urls 即可。

# 代理列表 URL（每行一个 ip:port 或带协议前缀）
proxy_list_urls:
  # 示例：付费国内代理 API 地址（替换为你自己的）
  # - "https://your-proxy-provider.com/api/get?type=txt&protocol=http&num=100"
  #
  # 以下为境外免费列表，仅适合目标是境外站点时使用：
  - "https://raw.githubusercontent.com/r00tee/Proxy-List/main/Socks5.txt"
  - "https://raw.githubusercontent.com/ClearProxy/checked-proxy-list/main/socks5/raw/all.txt"

# 特殊格式代理列表（自动用正则提取 ip:port）
special_proxy_list_urls:
  # - "https://example.com/complex-format-list.txt"

# 健康检测并发数
health_check_concurrency: 200

# 代理池刷新间隔（分钟）
update_interval_minutes: 5

# 健康检测设置
health_check:
  total_timeout_seconds: 8
  tls_handshake_threshold_seconds: 5
  # 健康检测目标（host:port）
  # 应与实际请求目标一致：国内目标填国内域名，境外目标填境外域名
  target: "www.bigmodel.cn:443"

# 服务监听端口
ports:
  socks5_strict: ":17283"
  socks5_relaxed: ":17284"
  http_strict: ":17285"
  http_relaxed: ":17286"
